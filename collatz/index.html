<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Maximilian F. Hasler">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Reverse Collatz Graph - by M. F. Hasler, April 2026</title>
    <link rel="stylesheet" href="collatz.css" />
    <script src="collatz.js"></script>
</head>
<body>
    <div id="sidebar">
        <h2>Reverse Collatz Tree</h2>
        <center>&copy; 2026 by M. F. Hasler</center>
        <p class="desc">Rooted at 2. Radial lines represent <i>n &mapsto; n</i>/2 steps. 
            Arcs represent <i>n</i> &mapsto; 3<i>n</i>+1 steps.</p>
        <div class="control-group">
            <label>Max Generations (Distance)
            <input type="number" id="max_gen" value="14" min="1" max="30"/></label>
        </div>
        <div class="control-group">
            <label>Unit Length
            <input type="number" id="unit_len" value="30" min="20" max="300"></label>
        </div>
        <div class="control-group">
            <label>Line Thickness
            <input type="number" id="thickness" value="1" min="0.1" max="9" step="0.1"></label>
        </div>
        <div class="control-group">
            <label>Font Size
            <input type="number" id="font_size" value="10" min="5" max="30"></label>
        </div>
        <div class="control-group">
            <label>"Middle" percentage
            <input type="number" id="middle" value="45" min="5" max="95"/></label>
        </div>
        <div class="control-group">
            <label>Radial Edge Color (/2)
            <input type="color" id="color_straight" value="#90A4AE"></label>
        </div>
        <div class="control-group">
            <label>Arc Edge Color (3n+1)
            <input type="color" id="color_arc" value="#E91E63"></label>
        </div>
        <div class="control-group">
            <label class="select">Multiples of 3
<select id="truncate">
  <option value=0>Dont't truncate</option>
  <option value=1>Truncate at 1st</option>
  <option value=2 selected>Truncate at 2nd</option>
</select>
<select id="position">
  <option value="start">Position: start</option>
  <option value="middle" selected>Position: middle</option>
  <option value="end">Position: end</option>
</select>
            </label>
        </div>
        <button onclick="drawGraph()">Generate Graph</button>
    </div>
    <div id="main">
        <svg id="canvas"></svg>
    </div>
</body>
</html>
